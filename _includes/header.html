<header class="site-header" id="site-header" role="banner">
  <nav class="nav-container" aria-label="Main navigation">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} home">
      <span class="logo-bracket" aria-hidden="true">&lt;</span><span class="logo-name">DevOpsWes</span><span class="logo-bracket" aria-hidden="true">/&gt;</span>
    </a>

    <ul class="nav-links" role="list">
      <li><a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a></li>
      <li><a href="{{ '/about' | relative_url }}" class="nav-link{% if page.url contains 'about' %} active{% endif %}" {% if page.url contains 'about' %}aria-current="page"{% endif %}>About</a></li>
      <li><a href="{{ '/tags' | relative_url }}" class="nav-link{% if page.url contains 'tags' %} active{% endif %}" {% if page.url contains 'tags' %}aria-current="page"{% endif %}>Tags</a></li>
      <li><a href="{{ '/search' | relative_url }}" class="nav-link{% if page.url contains 'search' %} active{% endif %}" {% if page.url contains 'search' %}aria-current="page"{% endif %}>Search</a></li>
    </ul>

    <div class="nav-actions">
      <button class="theme-toggle"id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
        <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobile-menu" role="navigation" aria-label="Mobile navigation" hidden>
    <a href="{{ '/' | relative_url }}" class="mobile-nav-link">Home</a>
    <a href="{{ '/about' | relative_url }}" class="mobile-nav-link">About</a>
    <a href="{{ '/tags' | relative_url }}" class="mobile-nav-link">Tags</a>
    <a href="{{ '/search' | relative_url }}" class="mobile-nav-link">Search</a>
  </div>
</header>
