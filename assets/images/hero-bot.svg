<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 450" fill="none">
  <defs>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="body-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a2235"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="70%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground glow -->
  <ellipse cx="190" cy="440" rx="95" ry="10" fill="#00d4ff" opacity="0.07"/>

  <!-- ── LEGS ── -->
  <rect x="143" y="368" width="40" height="46" rx="11" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="197" y="368" width="40" height="46" rx="11" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Feet -->
  <rect x="133" y="406" width="58" height="18" rx="9" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect x="189" y="406" width="58" height="18" rx="9" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- ── BODY ── -->
  <rect x="108" y="258" width="164" height="116" rx="20" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Body panel line -->
  <line x1="138" y1="282" x2="242" y2="282" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.12"/>
  <!-- Status LEDs -->
  <circle cx="140" cy="301" r="5" fill="#00d4ff" opacity="0.7" filter="url(#glow-sm)"/>
  <circle cx="160" cy="301" r="5" fill="#7c3aed" opacity="0.7" filter="url(#glow-sm)"/>
  <circle cx="180" cy="301" r="5" fill="#10b981" opacity="0.7" filter="url(#glow-sm)"/>
  <!-- Progress bar -->
  <rect x="138" y="320" width="104" height="8" rx="4" fill="#00d4ff" opacity="0.08"/>
  <rect x="138" y="320" width="68" height="8" rx="4" fill="#00d4ff" opacity="0.55"/>

  <!-- ── ARMS ── -->
  <!-- Left arm -->
  <rect x="56" y="268" width="55" height="22" rx="11" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="54" cy="279" r="13" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- Right arm (raised, waving) -->
  <rect x="269" y="248" width="55" height="22" rx="11" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35" transform="rotate(-22 296 259)"/>
  <circle cx="325" cy="240" r="13" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Wave lines -->
  <path d="M 336 228 Q 344 220 338 212" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M 341 235 Q 352 228 348 218" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- ── NECK ── -->
  <rect x="170" y="239" width="40" height="22" rx="7" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.22"/>

  <!-- ── HEAD ── -->
  <rect x="80" y="110" width="220" height="134" rx="24" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Subtle inner highlight -->
  <rect x="82" y="112" width="216" height="130" rx="23" fill="#00d4ff" opacity="0.02"/>

  <!-- Ear bolts -->
  <circle cx="80" cy="164" r="8" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="300" cy="164" r="8" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- ── EYES ── -->
  <!-- Left eye socket -->
  <rect x="103" y="142" width="72" height="50" rx="13" fill="#080c14"/>
  <!-- Left eye: wide open (surprised) -->
  <circle cx="139" cy="167" r="20" fill="url(#eye-glow)" opacity="0.35"/>
  <circle cx="139" cy="167" r="13" fill="#00d4ff" opacity="0.22"/>
  <circle cx="139" cy="167" r="9" fill="#00d4ff" opacity="0.8" filter="url(#glow-sm)"/>
  <circle cx="139" cy="167" r="4" fill="#ffffff"/>
  <circle cx="143" cy="163" r="2" fill="#ffffff" opacity="0.7"/>

  <!-- Right eye socket -->
  <rect x="205" y="142" width="72" height="50" rx="13" fill="#080c14"/>
  <!-- Right eye: squinting / winking -->
  <circle cx="241" cy="167" r="20" fill="url(#eye-glow)" opacity="0.35"/>
  <circle cx="241" cy="167" r="13" fill="#00d4ff" opacity="0.22"/>
  <ellipse cx="241" cy="171" rx="9" ry="5.5" fill="#00d4ff" opacity="0.8" filter="url(#glow-sm)"/>
  <ellipse cx="241" cy="171" rx="4" ry="2.5" fill="#ffffff"/>
  <!-- Wink upper lid -->
  <path d="M 207 162 Q 241 152 275 162" stroke="#080c14" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M 209 164 Q 241 154 273 164" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ── EYEBROWS ── -->
  <!-- Left: raised high (shocked) -->
  <path d="M 105 133 Q 139 120 173 133" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Right: flat (winking side) -->
  <path d="M 207 138 Q 241 132 275 138" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- ── MOUTH (cheeky smirk) ── -->
  <path d="M 152 222 Q 178 236 214 218" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <circle cx="215" cy="218" r="3.5" fill="#00d4ff" opacity="0.55"/>

  <!-- ── ANTENNA ── -->
  <rect x="181" y="86" width="18" height="26" rx="5" fill="url(#body-grad)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.45"/>
  <line x1="190" y1="86" x2="190" y2="56" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Glow ball -->
  <circle cx="190" cy="48" r="16" fill="#00d4ff" opacity="0.08" filter="url(#glow-lg)"/>
  <circle cx="190" cy="48" r="10" fill="#00d4ff" opacity="0.2"/>
  <circle cx="190" cy="48" r="7" fill="#00d4ff" opacity="0.9" filter="url(#glow-sm)"/>
  <circle cx="193" cy="45" r="2.5" fill="white" opacity="0.9"/>

  <!-- ── SPEECH BUBBLE ── -->
  <rect x="248" y="44" width="126" height="76" rx="16" fill="#111827" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Bubble tail -->
  <path d="M 256 116 L 234 136 L 275 122" fill="#111827" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.55" stroke-linejoin="round"/>
  <!-- Bubble text -->
  <text x="261" y="70" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.95">404: feelings</text>
  <text x="261" y="86" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.95">not found</text>
  <text x="261" y="103" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.85">exit code: 0 ✓</text>

  <!-- ── FLOATING SYMBOLS ── -->
  <text x="16" y="188" font-family="monospace" font-size="16" fill="#7c3aed" opacity="0.45">&lt;/&gt;</text>
  <text x="345" y="148" font-family="monospace" font-size="14" fill="#00d4ff" opacity="0.35">{}</text>
  <text x="20" y="362" font-family="monospace" font-size="12" fill="#00d4ff" opacity="0.3">AI</text>
  <text x="344" y="370" font-family="monospace" font-size="12" fill="#7c3aed" opacity="0.4">&#x221e;</text>
  <text x="14" y="96" font-family="monospace" font-size="11" fill="#10b981" opacity="0.38">fn()</text>
  <text x="346" y="310" font-family="monospace" font-size="11" fill="#7c3aed" opacity="0.38">&#x2192;</text>
  <text x="343" y="210" font-family="monospace" font-size="10" fill="#00d4ff" opacity="0.3">npm i</text>
</svg>
